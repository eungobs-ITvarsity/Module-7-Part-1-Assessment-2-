<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- Link to our CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main calculator container -->
    <div class="calculator">

        <!-- The screen that shows the numbers -->
        <div class="display">
            <!-- Shows the previous number and operator like "5 +" -->
            <div class="previous-operand" id="previousOperand"></div>
            <!-- Shows the current number being typed -->
            <div class="current-operand" id="currentOperand">0</div>
        </div>

        <!-- All the calculator buttons -->
        <div class="buttons">

            <!-- Top row: Clear, Delete, Percentage, Divide -->
            <button class="btn special" id="clear">AC</button>
            <button class="btn special" id="delete">DEL</button>
            <button class="btn special" data-operator="%">%</button>
            <button class="btn operator" data-operator="/">÷</button>

            <!-- Second row: 7, 8, 9, Multiply -->
            <button class="btn" data-number="7">7</button>
            <button class="btn" data-number="8">8</button>
            <button class="btn" data-number="9">9</button>
            <button class="btn operator" data-operator="*">×</button>

            <!-- Third row: 4, 5, 6, Subtract -->
            <button class="btn" data-number="4">4</button>
            <button class="btn" data-number="5">5</button>
            <button class="btn" data-number="6">6</button>
            <button class="btn operator" data-operator="-">−</button>

            <!-- Fourth row: 1, 2, 3, Add -->
            <button class="btn" data-number="1">1</button>
            <button class="btn" data-number="2">2</button>
            <button class="btn" data-number="3">3</button>
            <button class="btn operator" data-operator="+">+</button>

            <!-- Bottom row: +/-, 0, Decimal, Equals -->
            <button class="btn special" id="negate">+/−</button>
            <button class="btn" data-number="0">0</button>
            <button class="btn" data-number=".">.</button>
            <button class="btn equals" id="equals">=</button>
        </div>
    </div>

    <!-- Link to our JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
